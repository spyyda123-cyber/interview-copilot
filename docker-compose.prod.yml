version: '3.8'

x-backend-env: &backend-env
  DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/interview_copilot
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/0
  LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GEMINI_GENERATION_MODEL: ${GEMINI_GENERATION_MODEL:-gemini-2.5-pro-preview-05-06}
  GEMINI_FALLBACK_MODEL: ${GEMINI_FALLBACK_MODEL:-gemini-2.5-flash-preview-05-20}
  USE_S3_STORAGE: "true"
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-interview-copilot-files}
  AWS_S3_REGION: ${AWS_S3_REGION:-ap-south-1}
  ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-zaheer-super-secret-2026}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY:-interview-copilot-jwt-super-secret-key-2026}

services:
  # ---------------------
  # 1. INFRASTRUCTURE
  # ---------------------
  db:
    image: ankane/pgvector:v0.5.1
    container_name: copilot_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: interview_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: copilot_redis
    restart: always
    ports:
      - "6379:6379"

  # ---------------------
  # 2. APIs (FASTAPI)
  # ---------------------
  student-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: student/backend
    container_name: copilot_student_api
    restart: always
    environment:
      <<: *backend-env
    ports:
      - "8010:8000"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  admin-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: admin/backend
    container_name: copilot_admin_api
    restart: always
    environment:
      <<: *backend-env
    ports:
      - "8020:8000"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy

  super-admin-api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: super-admin/backend
    container_name: copilot_super_admin_api
    restart: always
    environment:
      <<: *backend-env
    ports:
      - "8030:8000"
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy

  # ---------------------
  # 3. CELERY WORKERS (Student Backend handles this)
  # ---------------------
  celery-worker-default:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: student/backend
    container_name: copilot_celery_default
    restart: always
    environment:
      <<: *backend-env
    command: ["python", "-m", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--queues", "default", "--concurrency=2"]
    depends_on:
      - redis
      - db

  celery-worker-llm:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: student/backend
    container_name: copilot_celery_llm
    restart: always
    environment:
      <<: *backend-env
    command: ["python", "-m", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--queues", "llm", "--concurrency=2"]
    depends_on:
      - redis
      - db

  celery-worker-agent:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: student/backend
    container_name: copilot_celery_agent
    restart: always
    environment:
      <<: *backend-env
    command: ["python", "-m", "celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=info", "--queues", "agent", "--concurrency=1"]
    depends_on:
      - redis
      - db

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        BACKEND_DIR: student/backend
    container_name: copilot_celery_beat
    restart: always
    environment:
      <<: *backend-env
    command: ["python", "-m", "celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=info"]
    depends_on:
      - redis
      - db

volumes:
  postgres_data:
