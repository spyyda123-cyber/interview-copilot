##############################################################
# NGINX REVERSE PROXY CONFIG — Interview Copilot
# Handles all 3 backends + serves frontend static files
##############################################################

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Increase upload size limit (for resume/marksheet uploads)
    client_max_body_size 20M;

    # ── Student Backend API ──────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # Replace with your domain or EC2 public IP

        # Student API — port 8010
        location /api/student/ {
            proxy_pass         http://student-api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # Admin API — port 8020
        location /api/admin/ {
            proxy_pass         http://admin-api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Super-Admin API — port 8030
        location /api/super-admin/ {
            proxy_pass         http://super-admin-api:8000/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://student-api:8000/health;
        }
    }
}
